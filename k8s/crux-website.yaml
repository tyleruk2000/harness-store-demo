apiVersion: apps/v1
kind: Deployment
metadata:
  name: crux-postgres
  labels:
    app: crux-postgres
  annotations:
    harness.io/direct-apply: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crux-postgres
  template:
    metadata:
      labels:
        app: crux-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: crux
            - name: POSTGRES_PASSWORD
              value: crux
            - name: POSTGRES_DB
              value: crux
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {} 
---
apiVersion: v1
kind: Service
metadata:
  name: crux-postgres
spec:
  selector:
    app: crux-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crux-backend
  labels:
    app: crux-backend
  annotations:
    harness.io/direct-apply: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crux-backend
  template:
    metadata:
      labels:
        app: crux-backend
    spec:
      containers:
        - name: crux-backend
          image: <+artifacts.sidecars.backend.image>   # backend = sidecar artifact
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://crux:crux@crux-postgres:5432/crux
            - name: ADMIN_PASSCODE
              value: belay-on
            - name: RUN_MIGRATIONS_ON_START
              value: "true"
            - name: SEED_ON_STARTUP
              value: "true"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: crux-backend
spec:
  selector:
    app: crux-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crux-frontend
  labels:
    app: crux-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: crux-frontend
  template:
    metadata:
      labels:
        app: crux-frontend
    spec:
      containers:
        - name: crux-frontend
          image: <+artifact.image>   # frontend = primary artifact
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: http://crux-backend:8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: crux-frontend
spec:
  selector:
    app: crux-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
